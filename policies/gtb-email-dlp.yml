# GTB DLP Policy: Email Data Loss Prevention
# Scans and blocks sensitive data in outgoing emails
# Author: Manjula Wickramasuriya

policy_name: "Email DLP"
description: "Scans outgoing emails for sensitive data (PII, financial info, credentials) and blocks transmission"
severity: "High"
enabled: true

# Trigger conditions
triggers:
  - type: "email_outbound"
    conditions:
      - name: "Sensitive Data Scan"
        patterns:
          - name: "Credit Card"
            regex: "(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13})"
            action: "block"
          - name: "SSN"
            regex: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
            action: "block"
          - name: "Password"
            regex: "(?i)(password|pwd|pass)\\s*[=:]\\s*\\S+"
            action: "block"
          - name: "API Key"
            regex: "(?i)(api_key|apikey|secret_key)\\s*[=:]\\s*[A-Za-z0-9_-]{20,}"
            action: "block"

# Actions when triggered
actions:
  - type: "block"
    message: "Email blocked: sensitive data detected"
  - type: "log"
    level: "high"
  - type: "notify"
    recipients: ["security-team@gttb.com"]

# Scope
scope:
  - direction: ["outbound"]
  - channels: ["email"]

# Exceptions (optional)
exceptions:
  - name: "Finance Department"
    condition: "user.group == 'finance'"
